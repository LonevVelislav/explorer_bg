<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <title>Explorer-Bg | Fiding the best places in bulgaria</title>
    <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <style>
  </style>
  <body>

    <!--Header-->
    <header class="header">
        <nav class="main-nav-list">
          <form class="nav-search">
            <button class="search-button" >
              <svg>
                <use xlink:href="img/icons.svg#icon-search"></use>
              </svg>
            </button>
            <input
            type="text"
            placeholder="Search places"
            class="nav-search-input"
            />
          </form>
        </nav>
        <div class="header-logo">
          <img src="./img/logo//b51a5c3039844aa0a6677738cf96e916-removebg-preview.png" alt="Explorer-logo" />
        </div>
        <nav class="nav nav-user">
          <a href="#" class="main-nav-link btn">All places</a>
          <a href="#" class="main-nav-link btn">My places</a>
          <a href="#" class="main-nav-link btn">
            <img src="" alt="User photo" class="nav-user-img" />
            <span>Velislav<span>
          </a>
          <!-- if not logged in -->
          <!-- <button class="nav-el">Log in</button>
          <button class="nav-el">Sign in</button> -->
        </nav>
      </header>
    <main class="map-box">
        <div class="location-stats">
            <p>Distance:<span class="distance"></span></p> 
            <p>Duration:<span class="duration"></span></p>
        </div>
        <div id="map"></div>
    </main>

      <div class="footer">
        <div class="footer-logo">
          <img src="#" alt="bg explorer-logo">
        </div>
      </div>
       <p class="footer-copyright">
        &copy; by Velislav Lonev. All right reserved
       </p>
      <script src="./scrypts/mapbox.js"></script>
  </body>
</html>
